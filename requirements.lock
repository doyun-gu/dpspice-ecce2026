# DPSpice — pinned dependency lock (constraints file)
#
# Exact versions of the full dependency tree (core + [cli] + [mcp] + [dev])
# captured from a known-good environment so a reproduction of the paper's
# numbers installs the same stack we validated against.
#
# Reference environment:
#   Python   3.13.0
#   Platform macOS 26 / arm64   (versions are platform-independent pins)
#   Captured for DPSpice v1.0.0 (ECCE 2026 release)
#
# Use it as a pip *constraints* file (it pins, it does not select what to
# install — the extras decide that):
#
#   pip install -e .[dev] -c requirements.lock
#
# For a minimal solver-only reproduction, the load-bearing pins are numpy,
# scipy, and simpleeval; the rest support the CLI, the MCP server, and tests.
# Regenerate after a deliberate dependency bump with:
#
#   pip freeze | grep -iv '^dpspice' > requirements.lock   # then re-add this header

