name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install ngspice (cross-validation oracle)
        run: |
          sudo apt-get update
          sudo apt-get install -y ngspice
          ngspice --version || true

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Pytest (golden + determinism + errors + reproduce consistency)
        run: pytest

      - name: Validation suite (real engine vs ngspice)
        run: dpspice suite --quick

  core-import:
    # Proves the lean core (numpy+scipy only) imports and runs with NO
    # cli/mcp/viz extras installed.
    name: core-only import
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install core only
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Import library core without extras
        run: |
          python -c "import dpspice; from dpspice import api, dispatch, crossval, reproduce, compare; print('core import OK')"
